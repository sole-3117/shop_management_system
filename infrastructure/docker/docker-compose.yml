version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shop_db
    environment:
      POSTGRES_DB: ${DB_NAME:-shop_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../packages/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: shop_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-shop_db}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: shop_web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  bot:
    build:
      context: ../../apps/bot
      dockerfile: Dockerfile
    container_name: shop_bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_URL: http://api:5000
      WEBAPP_URL: ${WEBAPP_URL}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  api_uploads:
